server:
  port: 8080

spring:
  application:
    name: legal-contract-assistant
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/legal_contract_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12181168}
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:demo-key}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:Qwen/Qwen3-Embedding-4B}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

elasticsearch:
  uris: ${ELASTICSEARCH_URIS:http://localhost:9200}


rag:
  ai:
    elasticsearch:
      url: ${RAG_AI_ELASTICSEARCH_URL:http://server1.shanci.tech:60080/es/}
      username: ${RAG_AI_ELASTICSEARCH_USERNAME:elastic}
      password: ${RAG_AI_ELASTICSEARCH_PASSWORD:}
    embedding:
      base-url: ${RAG_AI_EMBEDDING_BASE_URL:http://localhost:11434/v1}
      api-key: ${RAG_AI_EMBEDDING_API_KEY:}
      model: ${RAG_AI_EMBEDDING_MODEL:qwen3-embedding:4b}
      dimension: ${RAG_AI_EMBEDDING_DIMENSION:2560}
    chat:
      base-url: ${RAG_AI_CHAT_BASE_URL:http://localhost:11434/v1}
      api-key: ${RAG_AI_CHAT_API_KEY:}
      model: ${RAG_AI_CHAT_MODEL:qwen2.5:7b}

app:
  admin:
    accounts: ${ADMIN_ACCOUNTS:}
    token: ${ADMIN_API_TOKEN:}
