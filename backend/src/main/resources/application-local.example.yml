# Safe local-profile template. Keep real values in environment variables or an untracked local override.
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/legal_contract_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:demo-key}

app:
  admin:
    accounts: ${ADMIN_ACCOUNTS:}
    token: ${ADMIN_API_TOKEN:}
